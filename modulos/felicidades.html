<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Felicidades!</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/felicidades.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<!-- Fondo -->
<div id="bg">
  <div class="rays"></div>
  <div class="cloud cl1"></div>
  <div class="cloud cl2"></div>
  <div class="cloud cl3"></div>
</div>

<!-- Header -->
<div id="header">
  <button class="icon-btn"><i class="fa-solid fa-grip"></i></button>
  <button class="icon-btn"><i class="fa-solid fa-volume-xmark"></i></button>
  <button class="icon-btn"><i class="fa-solid fa-gear"></i></button>
</div>

<!-- Estrella izquierda -->
<div class="star star-left">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="#FFD700" stroke="#F5A623" stroke-width="2"/>
    <circle cx="38" cy="48" r="5" fill="#1a1a2e"/>
    <circle cx="62" cy="48" r="5" fill="#1a1a2e"/>
    <circle cx="40" cy="46" r="2" fill="white"/>
    <circle cx="64" cy="46" r="2" fill="white"/>
    <path d="M 38 60 Q 50 70 62 60" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="32" cy="56" r="5" fill="#FFB3BA" opacity="0.7"/>
    <circle cx="68" cy="56" r="5" fill="#FFB3BA" opacity="0.7"/>
    <text x="72" y="20" font-size="12" fill="#FFD700">✦</text>
    <text x="78" y="32" font-size="8"  fill="#FFD700">✦</text>
  </svg>
</div>

<!-- Estrella derecha -->
<div class="star star-right">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="#FFD700" stroke="#F5A623" stroke-width="2"/>
    <circle cx="38" cy="48" r="5" fill="#1a1a2e"/>
    <circle cx="62" cy="48" r="5" fill="#1a1a2e"/>
    <circle cx="40" cy="46" r="2" fill="white"/>
    <circle cx="64" cy="46" r="2" fill="white"/>
    <path d="M 38 60 Q 50 70 62 60" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="32" cy="56" r="5" fill="#FFB3BA" opacity="0.7"/>
    <circle cx="68" cy="56" r="5" fill="#FFB3BA" opacity="0.7"/>
    <text x="72" y="20" font-size="12" fill="#FFD700">✦</text>
  </svg>
</div>

<!-- Contenido -->
<div id="center">

  <div class="card">
    <h1>Felicidades lograste<br>pasar al siguiente<br>nivel</h1>
  </div>

  <div class="card">
    <div class="card-info">
      Obtuviste <span id="puntos">0</span> puntos <br>
      Siguiente nivel
    </div>
<button id="next-btn" onclick="window.location.href='../casa.html'">
  <i class="fa-solid fa-play"></i>
</button>
  </div>

</div>

<script>
  // Recibe el puntaje desde modulo1
  const params = new URLSearchParams(window.location.search);
  const pts    = params.get('score');
  if (pts) document.getElementById('puntos').textContent = pts;

  // Confetti
  const colores = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD'];
  for (let i = 0; i < 60; i++) {
    const c          = document.createElement('div');
    c.className      = 'confetti';
    c.style.left     = Math.random() * 100 + 'vw';
    c.style.background       = colores[Math.floor(Math.random() * colores.length)];
    c.style.animationDuration = (Math.random() * 3 + 2) + 's';
    c.style.animationDelay   = (Math.random() * 2) + 's';
    c.style.width    = (Math.random() * 10 + 6) + 'px';
    c.style.height   = (Math.random() * 10 + 6) + 'px';
    document.body.appendChild(c);
  }
</script>

</body>
</html>
